<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖形旋轉重疊分析器 (實戰推理版)</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --cell-size: 45px; --grid-gap: 4px;
            --highlight-100: #ff0000; --highlight-75: #ff6b6b; --highlight-50: #ffbaba; --highlight-25: #ffe3e3;
            --miss-color: #e0e0e0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9em; margin-bottom: 20px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; font-size: 1.1em; background: #ddd; border: none; border-radius: 8px 8px 0 0; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: white; font-weight: bold; border-top: 3px solid #007bff; }
        .tab-content { display: none; width: 100%; max-width: 1100px; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .tab-content.active { display: flex; }

        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 340px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(6, var(--cell-size)); grid-template-rows: repeat(6, var(--cell-size)); gap: var(--grid-gap); background-color: #333; padding: var(--grid-gap); border-radius: 4px; margin: 15px 0; }
        .cell { background-color: white; width: var(--cell-size); height: var(--cell-size); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; user-select: none; }
        
        .cell[data-state="X"] { background-color: var(--miss-color); color: #888; }
        .cell[data-state="O"] { background-color: #444; color: white; }
        .cell[data-state="0"], .cell[data-state="1"], .cell[data-state="2"], .cell[data-state="3"] { background-color: #0056b3; color: white; }
        
        .heatmap-cell[data-prob="100"] { border: 3px solid darkred; background-color: var(--highlight-100); color: white; }
        .heatmap-cell[data-prob="high"] { background-color: var(--highlight-75); }
        .heatmap-cell[data-prob="med"] { background-color: var(--highlight-50); }
        .heatmap-cell[data-prob="low"] { background-color: var(--highlight-25); }

        .controls, .row-controls { display: flex; gap: 10px; width: 100%; align-items: center; flex-wrap: wrap; justify-content: center;}
        input[type="text"], textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        textarea { height: 200px; font-family: monospace; resize: vertical; width: 100%; white-space: pre;}
        
        button { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        button.secondary { background-color: #6c757d; }
        button.danger { background-color: #dc3545; }
        
        .tool-btn { padding: 6px 12px; background: #e2e8f0; color: #333; border: 2px solid transparent; font-weight: bold; border-radius:4px; cursor:pointer;}
        .tool-btn.selected { border-color: #000; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
        .tool-btn[data-val="0"], .tool-btn[data-val="1"], .tool-btn[data-val="2"], .tool-btn[data-val="3"] { background: #cce5ff; color: #004085; }
        .tool-btn.selected[data-val="0"], .tool-btn.selected[data-val="1"], .tool-btn.selected[data-val="2"], .tool-btn.selected[data-val="3"] { background: #0056b3; color: white; border-color: #004085;}

        .info-box { padding: 12px; background: #e9ecef; border-radius: 4px; width: 100%; font-size: 0.95rem; box-sizing: border-box; text-align: left;}
        .possibility-list { font-size: 0.9em; color: #444; margin-top: 10px; max-height: 150px; overflow-y: auto; background: white; padding: 10px; border-radius: 4px; border: 1px solid #ddd; width: 100%; box-sizing: border-box;}
        
        .db-group { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; background:#fdfdfd;}
        .db-group-title { font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        .db-shape-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .shape-btn { padding: 4px 8px; font-size: 0.85em; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        .shape-btn:hover { background: #e9ecef; }
        .shape-btn.active-edit { background: #ffc107; border-color: #d39e00; }

    </style>
</head>
<body>

    <h1>圖形推理計算機</h1>
    <div class="subtitle">輸入代碼 -> 載入圖形 -> 點擊格子給予條件 -> 動態剔除</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('deduce')">1. 實戰推理</button>
        <button class="tab-btn" onclick="switchTab('edit')">2. 資料庫建檔</button>
    </div>

    <div id="tab-deduce" class="tab-content active">
        <div class="panel">
            <h3>1. 載入目標與設定條件</h3>
            <div class="row-controls" style="margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px;">
                <input type="text" id="targetCode" placeholder="輸入圖形代碼 (如 2222)" style="width: 150px;">
                <button onclick="startDeduction()">載入並重置推理</button>
            </div>

            <p style="font-size:0.85em; color:#666; margin:0 0 5px 0;">選擇工具後，點擊下方網格標記你看到的結果：</p>
            <div class="row-controls" id="deduceTools">
                <button class="tool-btn selected" data-val="?">清除</button>
                <button class="tool-btn" data-val="X">無圖(X)</button>
                <button class="tool-btn" data-val="O">有圖(無方向)</button>
                <button class="tool-btn" data-val="0">上(↑)</button>
                <button class="tool-btn" data-val="1">右(→)</button>
                <button class="tool-btn" data-val="2">下(↓)</button>
                <button class="tool-btn" data-val="3">左(←)</button>
            </div>
            
            <div class="grid-container" id="deduceGrid"></div>
        </div>

        <div class="panel">
            <h3>2. 機率熱區 (動態計算)</h3>
            <div class="grid-container" id="heatmapGrid"></div>
            <div class="info-box" id="deduceInfo">請先輸入代碼並載入。</div>
            <div class="possibility-list" id="possibilityList"></div>
        </div>
    </div>

    <div id="tab-edit" class="tab-content">
        <div class="panel">
            <h3>繪製與編輯圖形</h3>
            <div class="row-controls" id="editTools" style="margin-bottom: 10px;">
                <button class="tool-btn selected" data-val="?">橡皮擦</button>
                <button class="tool-btn" data-val="0">上(↑)</button>
                <button class="tool-btn" data-val="1">右(→)</button>
                <button class="tool-btn" data-val="2">下(↓)</button>
                <button class="tool-btn" data-val="3">左(←)</button>
            </div>
            <div class="grid-container" id="editGrid"></div>
            
            <div class="row-controls">
                <input type="text" id="editCode" placeholder="圖形代碼 (如 2222)" style="width: 120px;">
                <button onclick="saveShape()" id="saveBtn">儲存為新圖形</button>
                <button onclick="prepareNewShape()" class="secondary">清空畫布</button>
            </div>
            <p id="editStatusMsg" style="font-size: 0.85em; color: #d39e00; margin-top: 10px; font-weight:bold;"></p>
        </div>

        <div class="panel">
            <h3>資料庫管理 (點擊圖形可載入編輯)</h3>
            <div id="dbCodeList" style="width: 100%; max-height: 300px; overflow-y: auto; padding-right:5px;"></div>
            
            <hr style="width:100%; margin:15px 0; border:0; border-top:1px solid #ddd;">
            <p style="font-size: 0.85em; color: #666; margin: 0 0 5px 0;">產生 GitHub 永久儲存用 JSON (已壓縮排版)</p>
            <textarea id="dbTextarea" readonly placeholder="點擊下方按鈕產生程式碼，全選複製後貼到你的 GitHub index.html 中的 PERMANENT_DB 變數覆蓋即可。"></textarea>
            <div class="row-controls" style="margin-top: 10px;">
                <button onclick="generateExportJSON()">產生壓縮 JSON</button>
                <div style="flex:1"></div>
                <button onclick="clearDB()" class="danger">清空自訂/微調紀錄</button>
            </div>
        </div>
    </div>

        let localDB = JSON.parse(localStorage.getItem('advancedShapeDB')) || {};
        const GRID_SIZE = 6;
        const DIR_CHARS = { '?': '', 'X': 'X', 'O': 'O', '0': '↑', '1': '→', '2': '↓', '3': '←' };
        
        // 追蹤當前正在編輯的圖形索引 (-1 代表準備新增)
        let currentEditIndex = -1;

        // 【重點修正】：取得合併資料庫的邏輯
        // 規則：如果 localDB 有該代碼，則完全覆蓋 PERMANENT_DB 的對應代碼
        function getCombinedDB() {
            let combined = JSON.parse(JSON.stringify(PERMANENT_DB));
            for (let code in localDB) {
                combined[code] = localDB[code];
            }
            return combined;
        }

        // ================= 初始化與 UI =================
        let currentDeduceTool = '?';
        let currentEditTool = '?';
        let activeStates = []; 

        function init() {
            createGrid('deduceGrid', 'deduce');
            createGrid('heatmapGrid', 'heatmap');
            createGrid('editGrid', 'edit');
            
            setupTools('deduceTools', (val) => currentDeduceTool = val);
            setupTools('editTools', (val) => currentEditTool = val);
            updateDBListUI();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function createGrid(elementId, mode) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            for (let y = GRID_SIZE; y >= 1; y--) {
                for (let x = 1; x <= GRID_SIZE; x++) {
                    const div = document.createElement('div');
                    div.className = `cell ${mode}-cell`;
                    div.dataset.x = x; div.dataset.y = y;
                    div.dataset.state = '?';

                    if (mode === 'deduce') {
                        div.onclick = () => {
                            div.dataset.state = currentDeduceTool;
                            div.innerHTML = DIR_CHARS[currentDeduceTool];
                            runFilter();
                        };
                    } else if (mode === 'edit') {
                        div.onclick = () => {
                            div.dataset.state = currentEditTool;
                            div.innerHTML = DIR_CHARS[currentEditTool];
                        };
                    }
                    container.appendChild(div);
                }
            }
        }

        function setupTools(containerId, callback) {
            document.querySelectorAll(`#${containerId} .tool-btn`).forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll(`#${containerId} .tool-btn`).forEach(b => b.classList.remove('selected'));
                    e.target.classList.add('selected');
                    callback(e.target.dataset.val);
                };
            });
        }

        // ================= 旋轉與數學邏輯 =================
        function rotatePoint(x, y, dir, times) {
            let nx = x, ny = y, ndir = dir;
            for(let i=0; i<times; i++) {
                let tempX = nx;
                nx = ny;
                ny = GRID_SIZE + 1 - tempX;
                if(ndir !== 'O' && ndir !== '?') {
                    ndir = (parseInt(ndir) + 1) % 4;
                    ndir = ndir.toString();
                }
            }
            return { x: nx, y: ny, d: ndir };
        }

        // ================= 實戰推理邏輯 =================
        function startDeduction() {
            const code = document.getElementById('targetCode').value.trim();
            const db = getCombinedDB();
            
            if (!code || !db[code]) {
                alert(`找不到圖形代碼: ${code}`);
                return;
            }

            document.querySelectorAll('.deduce-cell').forEach(c => { c.dataset.state = '?'; c.innerHTML = ''; });
            
            activeStates = [];
            const shapes = db[code];
            shapes.forEach((shape, shapeIdx) => {
                for (let rot = 0; rot < 4; rot++) {
                    let rotatedPoints = shape.map(pt => rotatePoint(pt.x, pt.y, pt.d, rot));
                    activeStates.push({ name: `圖形${shapeIdx + 1} (${rot * 90}度)`, points: rotatedPoints });
                }
            });

            runFilter();
        }

        function runFilter() {
            if (activeStates.length === 0) {
                document.getElementById('deduceInfo').innerHTML = "請先載入圖形代碼。";
                return;
            }

            let constraints = [];
            document.querySelectorAll('.deduce-cell').forEach(cell => {
                const state = cell.dataset.state;
                if (state !== '?') constraints.push({ x: parseInt(cell.dataset.x), y: parseInt(cell.dataset.y), reqState: state });
            });

            let validStates = activeStates.filter(state => {
                let map = {};
                state.points.forEach(p => { map[`${p.x},${p.y}`] = p; });

                for (let c of constraints) {
                    const pt = map[`${c.x},${c.y}`];
                    if (c.reqState === 'X') { if (pt) return false; } 
                    else if (c.reqState === 'O') { if (!pt) return false; } 
                    else { if (!pt || pt.d !== c.reqState) return false; }
                }
                return true;
            });

            updateHeatmap(validStates);
        }

        function updateHeatmap(validStates) {
            const heatmapCells = document.querySelectorAll('.heatmap-cell');
            const info = document.getElementById('deduceInfo');
            const list = document.getElementById('possibilityList');
            
            heatmapCells.forEach(c => { c.dataset.prob = ""; c.innerHTML = ""; });

            if (validStates.length === 0) {
                info.innerHTML = "<span style='color:red; font-weight:bold;'>條件衝突！沒有符合的圖形，請檢查標記。</span>";
                list.innerHTML = "";
                return;
            }

            let freq = {};
            validStates.forEach(state => { state.points.forEach(p => { freq[`${p.x},${p.y}`] = (freq[`${p.x},${p.y}`] || 0) + 1; }); });

            const total = validStates.length;
            let mustHitCoords = [];

            heatmapCells.forEach(cell => {
                const count = freq[`${cell.dataset.x},${cell.dataset.y}`] || 0;
                if (count > 0) {
                    const percent = Math.round((count / total) * 100);
                    cell.innerHTML = percent === 100 ? '必' : `${percent}%`;
                    if (percent === 100) { cell.dataset.prob = "100"; mustHitCoords.push(`(${cell.dataset.x},${cell.dataset.y})`); } 
                    else if (percent >= 75) cell.dataset.prob = "high";
                    else if (percent >= 50) cell.dataset.prob = "med";
                    else cell.dataset.prob = "low";
                }
            });

            info.innerHTML = `剩餘可能組合： <strong>${total}</strong> 種。<br>` + 
                (mustHitCoords.length > 0 ? `<span style="color:darkred; font-weight:bold;">👉 下一步建議點擊必中格子：${mustHitCoords.join(', ')}</span>` : `目前無 100% 重合的格子，請點擊機率最高的格子。`);
            list.innerHTML = `<strong>剩餘可能：</strong><br>` + validStates.map(s => s.name).join('<br>');
        }

        // ================= 資料庫編輯與建檔邏輯 =================

        // 點選清單中的圖形，載入到畫布準備覆寫
        function loadEditShape(code, index) {
            document.querySelectorAll('.edit-cell').forEach(c => { c.dataset.state = '?'; c.innerHTML = ''; });
            document.getElementById('editCode').value = code;
            currentEditIndex = index;
            
            const db = getCombinedDB();
            const shape = db[code][index];
            
            shape.forEach(pt => {
                const cell = document.querySelector(`.edit-cell[data-x="${pt.x}"][data-y="${pt.y}"]`);
                if(cell) {
                    cell.dataset.state = pt.d;
                    cell.innerHTML = DIR_CHARS[pt.d];
                }
            });

            document.getElementById('saveBtn').textContent = "覆寫儲存此圖形";
            document.getElementById('editStatusMsg').textContent = `✏️ 正在編輯：${code} 的 圖形 ${index + 1}`;
            
            // 更新按鈕視覺狀態
            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active-edit'));
            document.getElementById(`btn-${code}-${index}`).classList.add('active-edit');
        }

        function prepareNewShape(code = "") {
            document.querySelectorAll('.edit-cell').forEach(c => { c.dataset.state = '?'; c.innerHTML = ''; });
            document.getElementById('editCode').value = code;
            currentEditIndex = -1;
            document.getElementById('saveBtn').textContent = "儲存為新圖形";
            document.getElementById('editStatusMsg').textContent = code ? `✨ 準備為 ${code} 新增圖形` : "";
            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active-edit'));
        }

        function saveShape() {
            const code = document.getElementById('editCode').value.trim();
            if (!code) return alert("請輸入代碼！");
            
            let points = [];
            document.querySelectorAll('.edit-cell').forEach(cell => {
                const state = cell.dataset.state;
                if (state !== '?' && state !== 'X') {
                    points.push({ x: parseInt(cell.dataset.x), y: parseInt(cell.dataset.y), d: state });
                }
            });

            if(points.length === 0) return alert("畫布是空的！");

            // 【重點】：如果 localDB 沒有這個代碼，先從 PERMANENT_DB 複製過來作為基準
            if (!localDB[code] && PERMANENT_DB[code]) {
                localDB[code] = JSON.parse(JSON.stringify(PERMANENT_DB[code]));
            }
            if (!localDB[code]) localDB[code] = [];

            if (currentEditIndex >= 0 && currentEditIndex < localDB[code].length) {
                // 覆寫模式
                localDB[code][currentEditIndex] = points;
                alert(`已覆寫更新代碼 [${code}] 的 圖形 ${currentEditIndex + 1}！`);
            } else {
                // 新增模式
                localDB[code].push(points);
                alert(`已新增一種圖形至代碼 [${code}]！`);
            }
            
            localStorage.setItem('advancedShapeDB', JSON.stringify(localDB));
            updateDBListUI();
            prepareNewShape(); // 儲存後重置為新增模式
        }

        function updateDBListUI() {
            const listEl = document.getElementById('dbCodeList');
            listEl.innerHTML = '';
            const db = getCombinedDB();
            
            Object.keys(db).sort().forEach(code => {
                const group = document.createElement('div');
                group.className = 'db-group';
                
                // 判斷狀態：如果 localDB 有此代碼，表示有被自訂/微調過 (顯示 ✏️)
                const isCustomized = localDB.hasOwnProperty(code);
                
                const title = document.createElement('div');
                title.className = 'db-group-title';
                title.innerHTML = `<span>代碼：<strong>${code}</strong> <span style="font-size:0.8em">${isCustomized ? '✏️ (含微調)' : '🔒 (內建)'}</span></span>`;
                group.appendChild(title);

                const btnContainer = document.createElement('div');
                btnContainer.className = 'db-shape-btns';

                db[code].forEach((shape, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'shape-btn';
                    btn.id = `btn-${code}-${idx}`;
                    btn.textContent = `圖形 ${idx + 1}`;
                    btn.onclick = () => loadEditShape(code, idx);
                    btnContainer.appendChild(btn);
                });

                const addBtn = document.createElement('button');
                addBtn.className = 'shape-btn';
                addBtn.style.background = '#d4edda';
                addBtn.textContent = '+ 新增圖形';
                addBtn.onclick = () => prepareNewShape(code);
                btnContainer.appendChild(addBtn);

                group.appendChild(btnContainer);
                listEl.appendChild(group);
            });
        }

        // ================= 壓縮匯出 JSON 邏輯 =================
        function generateExportJSON() {
            const db = getCombinedDB();
            let lines = ["const PERMANENT_DB = {"];
            let codes = Object.keys(db).sort();
            
            codes.forEach((code, i) => {
                lines.push(`    "${code}": [`);
                db[code].forEach((shape, j) => {
                    // 轉為字串並移除 key 旁邊的引號以節省空間
                    let shapeStr = JSON.stringify(shape).replace(/"x":/g, 'x:').replace(/"y":/g, 'y:').replace(/"d":/g, 'd:');
                    lines.push(`        ${shapeStr}${j < db[code].length - 1 ? ',' : ''}`);
                });
                lines.push(`    ]${i < codes.length - 1 ? ',' : ''}`);
            });
            lines.push("};");
            
            document.getElementById('dbTextarea').value = lines.join('\n');
            alert("已產生壓縮 JSON，請複製下方框框內的全部內容，覆蓋 GitHub 程式碼中的 PERMANENT_DB 變數！");
        }

        function clearDB() {
            if (confirm("這將會清除您在瀏覽器上做的所有新增與微調！\n(如果有按產生 JSON 並更新到 GitHub 的話就不會受影響)。\n確定要清空嗎？")) {
                localDB = {};
                localStorage.setItem('advancedShapeDB', JSON.stringify(localDB));
                updateDBListUI();
                prepareNewShape();
                document.getElementById('dbTextarea').value = "";
            }
        }

        init();
    </script>
</body>
</html>
